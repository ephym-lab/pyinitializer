services:
  backend:
    image: pyinitializer
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./:/app
    # depends_on:
    #   - postgres
    # Use reload in development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
